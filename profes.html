<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Banfield - Vista Profes</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060A06;--bg2:#0D130D;--bg3:#121A12;
  --brd:#1C2A1C;--brd2:#243424;
  --g1:#267A26;--g2:#308830;--g3:#3EA03E;
  --gold:#8A7040;--gold2:#A48A52;
  --red:#B83030;
  --txt:#C8D8C8;--txt2:#5A785A;--txt3:#2C3E2C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:Inter,sans-serif;font-size:14px;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--g1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:58px;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.brand{display:flex;align-items:center;gap:12px}
.brand-name{font-family:Oswald,sans-serif;font-weight:700;font-size:17px;letter-spacing:3px;color:var(--txt);text-transform:uppercase}
.brand-sub{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:2.5px;margin-top:1px}
.escudo{width:36px;height:auto}
.hdr-right{display:flex;align-items:center;gap:10px}
.btn-sync{background:transparent;border:1px solid var(--brd2);color:var(--txt2);padding:5px 12px;border-radius:5px;font-family:Inter,sans-serif;font-size:11.5px;cursor:pointer;transition:all .2s}
.btn-sync:hover{border-color:var(--g2);color:var(--g3)}
.btn-sync.ok{border-color:var(--g1);color:var(--g3)}
.btn-sync.err{border-color:var(--red);color:var(--red)}
.flbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txt2)}
select{background:var(--bg3);border:1px solid var(--brd2);color:var(--txt);padding:5px 9px;border-radius:5px;font-family:Inter,sans-serif;font-size:12px;outline:none}
select:focus{border-color:var(--g2)}
.page{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.page-title{font-family:Oswald,sans-serif;font-weight:700;font-size:20px;letter-spacing:2.5px;text-transform:uppercase;color:#E0EEE0}
.page-title span{color:var(--gold2)}
.page-sub{font-size:11.5px;color:var(--txt2);margin-top:2px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:11px}
.pc{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;overflow:hidden;transition:border-color .2s}
.pc:hover{border-color:var(--brd2)}
.pch{padding:11px 14px;border-bottom:1px solid var(--brd)}
.pcn{font-weight:600;font-size:15px;color:#E0EEE0;letter-spacing:.2px}
.pcm{font-size:11px;color:var(--txt2);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.pcb{padding:11px 14px}
.fb{font-family:Oswald,sans-serif;font-size:11px;font-weight:700;letter-spacing:.6px;padding:4px 10px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.f0{background:rgba(50,50,50,.2);color:#555;border:1px solid #333}
.f1{background:rgba(26,74,26,.2);color:#4A8A4A;border:1px solid #1C3E1C}
.f2{background:rgba(26,94,26,.25);color:#5A9A5A;border:1px solid #246A24}
.f3{background:rgba(138,112,64,.15);color:var(--gold);border:1px solid rgba(138,112,64,.3)}
.f4{background:rgba(138,112,64,.2);color:var(--gold2);border:1px solid rgba(138,112,64,.35)}
.f5{background:rgba(62,160,62,.12);color:#6AB86A;border:1px solid rgba(62,160,62,.25)}
.f6{background:rgba(62,160,62,.18);color:var(--g3);border:1px solid rgba(62,160,62,.35)}
.pills{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.pill{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;border-radius:6px}
.pill.ok{background:rgba(62,160,62,.07);border:1px solid rgba(62,160,62,.15)}
.pill.care{background:rgba(138,112,64,.07);border:1px solid rgba(138,112,64,.18)}
.pill.no{background:rgba(184,48,48,.06);border:1px solid rgba(184,48,48,.12)}
.pill-ico{font-size:19px;flex-shrink:0;margin-top:1px}
.pill-lbl{font-size:12px;font-weight:600;line-height:1.25}
.pill-lbl.ok{color:#6AB86A}.pill-lbl.care{color:var(--gold2)}.pill-lbl.no{color:#9A6060}
.pill-st{font-size:10px;color:var(--txt3);line-height:1;margin-top:2px}
.pnota{margin-top:10px;padding:9px 11px;background:rgba(138,112,64,.1);border:1px solid rgba(138,112,64,.3);border-left:3px solid var(--gold2);border-radius:5px;font-size:12px;font-weight:500;color:var(--gold2);line-height:1.45;display:flex;align-items:flex-start;gap:6px}
.pnota-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.pnota-txt{flex:1}
.dias-chip{font-family:Oswald,sans-serif;font-size:13px;color:var(--gold2);font-weight:600;letter-spacing:.3px}
.fase-row{display:flex;align-items:center;gap:7px;margin-bottom:2px}
.fase-lbl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txt2)}
.inj-info{font-size:11px;color:var(--txt3);margin-top:5px;line-height:1.4}
.empty{text-align:center;padding:60px 20px;color:var(--txt3);font-size:13px}
.empty-big{font-family:Oswald,sans-serif;font-size:18px;color:var(--txt2);margin-bottom:6px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:12px 14px}
.kv{font-family:Oswald,sans-serif;font-weight:700;font-size:36px;line-height:1;margin-bottom:2px}
.kv.r{color:var(--red)}.kv.g{color:var(--g3)}.kv.o{color:var(--gold2)}
.kl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--txt2)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--g1);border-radius:10px;padding:24px 26px;width:460px;max-width:94vw}
.modal-t{font-family:Oswald,sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:#E0EEE0;margin-bottom:4px}
.modal-s{font-size:11px;color:var(--txt2);margin-bottom:14px;line-height:1.5}
.modal-l{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:4px}
.modal-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.bm-ok{background:var(--g1);border:none;color:#E0EEE0;padding:7px 18px;border-radius:5px;font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.bm-can{background:transparent;border:1px solid var(--brd2);color:var(--txt2);padding:7px 14px;border-radius:5px;font-family:Inter,sans-serif;font-size:12px;cursor:pointer}
#toast{position:fixed;bottom:20px;right:20px;background:var(--g1);color:#E0EEE0;padding:10px 16px;border-radius:6px;font-size:12.5px;font-weight:500;z-index:999;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;border:1px solid var(--g2)}
#toast.on{transform:translateY(0);opacity:1}
#upd{font-size:10.5px;color:var(--txt3)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}

@media (max-width:700px){
  header{height:auto;padding:10px 12px;flex-direction:column;align-items:flex-start;gap:10px}
  .hdr-right{flex-wrap:wrap;gap:6px;width:100%}
  .hdr-right select{flex:1;min-width:100px;font-size:13px;padding:7px 9px}
  .brand{width:100%}
  .page{padding:14px 12px;gap:12px}
  .page-title{font-size:18px}
  .pg{grid-template-columns:1fr;gap:10px}
  .kpis{grid-template-columns:1fr 1fr 1fr;gap:8px}
  .kpi{padding:10px}
  .kv{font-size:28px}
  .kl{font-size:9px}
  .pills{grid-template-columns:1fr 1fr;gap:5px}
  .pill{padding:7px 9px}
  .pill-ico{font-size:18px}
  .pill-lbl{font-size:12px}
  .pill-st{font-size:10px}
  .pcn{font-size:15px}
  .pnota{font-size:12.5px;padding:9px 11px}
  .inj-info{font-size:11.5px}
}
</style>
</head>

  {id:'c',lbl:'Campo ind.'},
  {id:'t',lbl:'Tecnica'},
  {id:'r',lbl:'Reducido'},
  {id:'i',lbl:'Intermitente'},
  {id:'s',lbl:'Sprint'},
  {id:'co',lbl:'Contacto'},
  {id:'ca',lbl:'Con categ.'}
];
var AICO={'g':'\u{1F3CB}','c':'\u{1F3C3}','t':'\u26BD','r':'\u{1F465}','i':'\u2195','s':'\u{1F4A8}','co':'\u{1F44A}','ca':'\u{1F91D}'};

var allData=[],rehabMap={},sheetsURL='',seasonStart='2026-01-05';

function qs(id){return document.getElementById(id);}
function rKey(n){return n.trim().toLowerCase().replace(/\s+/g,'_');}

function load(){
  try{rehabMap=JSON.parse(localStorage.getItem(KR)||'{}');}catch(e){rehabMap={};}
  sheetsURL='https://script.google.com/macros/s/AKfycbxsjNPXGfefW1sozwAWBMru2ZF4EqU1lQ5Ic5t9bnX_hmE_tfBsBcJO6P4UP6gVf3I/exec';
  try{var sn=localStorage.getItem(KSN);if(sn)seasonStart=sn;}catch(e){}
}

function getMC(fechaStr){
  if(!fechaStr||!seasonStart)return null;
  var f=new Date(fechaStr+'T12:00:00');var s=new Date(seasonStart+'T12:00:00');
  var diff=Math.floor((f-s)/86400000);if(diff<0)return null;return Math.floor(diff/7)+1;
}
function getCurrentMC(){return getMC(new Date().toISOString().slice(0,10))||1;}
function getMCRange(mc){
  var s=new Date(seasonStart+'T12:00:00');
  var st=new Date(s.getTime()+(mc-1)*7*86400000);
  var en=new Date(st.getTime()+6*86400000);
  return{start:st.toISOString().slice(0,10),end:en.toISOString().slice(0,10)};
}

function render(){
  var catF=qs('pf-cat').value;
  var mcF=parseInt(qs('pf-mc').value||'')||0;

  // Populate MC select on first render
  var mcSel=qs('pf-mc');
  if(mcSel&&mcSel.options.length<=1){
    var cur=getCurrentMC();
    for(var m=1;m<=cur+4;m++){
      var o=document.createElement('option');o.value=m;
      o.textContent='MC '+m+(m===cur?' (actual)':'');mcSel.appendChild(o);
    }
  }

  var activos=allData.filter(function(d){return d.activo;});
  if(catF)activos=activos.filter(function(d){return d.categoria===catF;});
  if(mcF){var rng=getMCRange(mcF);activos=activos.filter(function(d){return d.fecha<=rng.end&&d.alta>=rng.start;});}

  // Deduplicate by name
  var seen={};
  activos=activos.filter(function(d){var k=rKey(d.nombre);if(seen[k])return false;seen[k]=true;return true;});

  // Sort by phase descending (most advanced first)
  activos.sort(function(a,b){
    var fa=rehabMap[rKey(a.nombre)]?rehabMap[rKey(a.nombre)].fase:0;
    var fb=rehabMap[rKey(b.nombre)]?rehabMap[rKey(b.nombre)].fase:0;
    if(fb!==fa)return fb-fa;
    return a.nombre.localeCompare(b.nombre);
  });

  // KPIs
  var avanzados=activos.filter(function(d){var rh=rehabMap[rKey(d.nombre)];return rh&&rh.fase>=4;}).length;
  var kine=activos.filter(function(d){var rh=rehabMap[rKey(d.nombre)];return !rh||rh.fase<=1;}).length;
  qs('k-act').textContent=activos.length;
  qs('k-ok').textContent=avanzados;
  qs('k-kine').textContent=kine;

  var grid=qs('profes-grid');
  if(!activos.length){
    grid.innerHTML='<div class="empty"><div class="empty-big">Sin lesionados activos</div>'
      +(allData.length===0?'Cargando datos...':'No hay jugadores en este filtro.')
      +'</div>';
    return;
  }
  grid.innerHTML='';

  activos.forEach(function(d){
    var k=rKey(d.nombre);
    var rh=rehabMap[k];
    var fase=rh?rh.fase:0;
    var diasR=d.alta?Math.max(0,Math.round((new Date(d.alta+'T12:00:00')-new Date())/86400000)):0;
    var mc=getMC(d.fecha);

    var card=document.createElement('div');card.className='pc';

    // Head
    var head=document.createElement('div');head.className='pch';
    head.innerHTML='<div class="pcn">'+d.nombre+'</div>'
      +'<div class="pcm">'
      +'<span style="background:var(--bg3);padding:1px 6px;border-radius:3px;font-size:9.5px">'+d.categoria+'</span>'
      +(d.posicion?'<span>'+d.posicion+'</span>':'')
      +(mc?'<span style="color:var(--txt3)">MC '+mc+'</span>':'')
      +'<span class="dias-chip">'+diasR+'d para alta</span>'
      +'</div>'
      +'<div class="inj-info">'+d.region+(d.lado&&d.lado!=='nan'?' - '+d.lado:'')+(d.tipo?' - '+d.tipo:'')+'</div>';

    // Body
    var body=document.createElement('div');body.className='pcb';

    // Fase
    var fr=document.createElement('div');fr.className='fase-row';
    fr.innerHTML='<span class="fase-lbl">Etapa:</span><span class="fb '+FC[fase]+'">'+FN[fase]+'</span>';
    body.appendChild(fr);

    // Pills
    var pills=document.createElement('div');pills.className='pills';
    ACTS.forEach(function(a){
      var st=rh&&rh.acts&&rh.acts[a.id]?rh.acts[a.id].st:0;
      var cls=['no','care','ok'][st];
      var slbl=['No puede','Con cuidado','Puede'][st];
      var pill=document.createElement('div');pill.className='pill '+cls;
      pill.innerHTML='<span class="pill-ico">'+(AICO[a.id]||a.id)+'</span>'
        +'<div><div class="pill-lbl '+cls+'">'+a.lbl+'</div><div class="pill-st">'+slbl+'</div></div>';
      pills.appendChild(pill);
    });
    body.appendChild(pills);

    // Nota
    if(rh&&rh.nota){
      var nota=document.createElement('div');nota.className='pnota';
      nota.innerHTML='<span class="pnota-ico">\u{1F4CC}</span><span class="pnota-txt"><strong style="display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:2px">Nota del kinesiologo</strong>'+rh.nota+'</span>';
      body.appendChild(nota);
    }

    card.appendChild(head);card.appendChild(body);
    grid.appendChild(card);
  });
}

// Sheets sync
function openSync(){qs('sheets-url').value=sheetsURL;qs('sync-modal').classList.add('on');}
function closeSync(){qs('sync-modal').classList.remove('on');}
function updateSyncBtn(){}
function syncFromSheets(){
  if(!sheetsURL)return;
  qs('upd').textContent='Sincronizando...';
  var cbName='pfCB'+Date.now();
  var script=document.createElement('script');
  script.src=sheetsURL+(sheetsURL.includes('?')?'&':'?')+'callback='+cbName;
  window[cbName]=function(json){
    delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script);
    if(!json||!json.ok){qs('upd').textContent='Error de conexion';return;}
    allData=json.data||[];
    var now=new Date();
    qs('upd').textContent='Actualizado '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
    render();
  };
  script.onerror=function(){delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script);qs('upd').textContent='Error de conexion';};
  setTimeout(function(){if(window[cbName]){delete window[cbName];qs('upd').textContent='Tiempo agotado';}},12000);
  document.head.appendChild(script);
}
function toast(msg){var t=qs('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2800);}

window.addEventListener('DOMContentLoaded',function(){
  load();
  qs('pf-cat').addEventListener('change',render);
  qs('pf-mc').addEventListener('change',render);
  render();
  if(sheetsURL)syncFromSheets();
  // Auto-refresh cada 5 minutos
  setInterval(function(){if(sheetsURL)syncFromSheets();},300000);
});
</script>
</body>
</html>
